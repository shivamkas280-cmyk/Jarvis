<script>

const API_KEY="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"

async function send(){

let msg=document.getElementById("msg").value.trim()
if(!msg) return

let chat=document.getElementById("chat")

chat.innerHTML+=`<div class="user">${msg}</div>`

document.getElementById("msg").value=""

chat.innerHTML+=`<div class="ai">Jarvis soch raha hai...</div>`

try{

let res = await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
headers:{
"Authorization":"Bearer "+API_KEY,
"Content-Type":"application/json",
"HTTP-Referer": location.href,
"X-Title":"Jarvis AI"
},
body:JSON.stringify({
model:"deepseek/deepseek-chat",
messages:[
{role:"system",content:"You are Jarvis AI created by Shivam. Reply in Hinglish."},
{role:"user",content:msg}
]
})
})

let data = await res.json()

console.log(data)

let reply = "Reply nahi mila"

if(data.choices){
reply = data.choices[0].message.content
}

chat.innerHTML+=`<div class="ai">${reply}</div>`

}catch(e){

chat.innerHTML+=`<div class="ai">Error: API connect nahi ho pa raha</div>`

console.log(e)

}

}

</script>
